name: CI workflow

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    # Run only on branches/commits and not tags
    branches:
      - integration-test
  pull_request:
    branches:
      - main

jobs:
  run-integration-tests:
    name: Run Integration Test
    runs-on: ubuntu-22.04
    container: ghcr.io/eclipse-velocitas/devcontainer-base-images/${{ matrix.language }}:latest
    strategy:
      matrix:
        language: ["python", "cpp"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set commit id
        run: |
          NEW_CONFIG="$(jq --arg GITHUB_SHA "$GITHUB_SHA" '.packages[0].version |= $GITHUB_SHA' test/.velocitas.json)"
          echo "${NEW_CONFIG}" > test/.velocitas.json

      - name: Install required packages
        run: |
          pip install -r test/requirements-test.txt

      - name: Init velocitas project
        run: |
          cd test
          velocitas init

      - name: Run integration test
        run: |
          cd test
          pytest -s ./integration/integration_test.py
